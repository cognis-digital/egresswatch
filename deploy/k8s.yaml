apiVersion: apps/v1
kind: Deployment
metadata: { name: egresswatch, labels: { app: egresswatch } }
spec:
  replicas: 1
  selector: { matchLabels: { app: egresswatch } }
  template:
    metadata: { labels: { app: egresswatch } }
    spec:
      containers:
        - name: egresswatch
          image: ghcr.io/cognis-digital/egresswatch:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: egresswatch }
spec:
  selector: { app: egresswatch }
  ports: [{ port: 80, targetPort: 8000 }]
